            <script>
        var popupCssData = null;
        var popupSetting = null
        var isModelOpen = false
         const {
            createApp
          } = Vue;
          const quotes_double = `"`;
          const quotes_single = `'`;
          class TemplateEngiene {
            appContainer;
            app;
            template;
            dynamicdata;
            section = [
              "timer",
              "sub_headline",
              "main_headline",
              "call_to_action",
              "video_section",
              "text_block",
              "image_block",
              "forminput",
              "savebutton",
              "lead_bullets",
              "fb_comments",
              "pstatement",
            ];
            confsection = [
              "timer",
              "sub_headline",
              "main_headline",
              "call_to_action",
              "video_section",
              "text_block",
              "image_block",
              "bullets",
              "banner_setting",
              "savebutton",
              "fb_comments",
              "pstatement",
            ];

            constructor(template, dynamicdata, base_template_data, api_url, flinks, funnel, type,blast_id,redirect_url,textblock,autoData,pcode,is_preview,affiliate_id,id = null) {
              this.template = template;
              this.dynamicdata = dynamicdata;
              this.api_url = api_url
              this.flinks = flinks
              this.funnel = funnel
              this.type = type
              this.blast_id=blast_id
              this.redirect_url=redirect_url
              this.textblock=textblock
              this.baseTemplateData = base_template_data
              this.svgArray = window.svgArray
              this.autoData = autoData
              this.is_preview = is_preview
              if (!id) {
                this.appContainer = document.createElement("DIV");
                this.appContainer.id = "app";
                document.body.innerHTML = "";
                document.body.appendChild(this.appContainer);
              } else {
                this.appContainer = document.getElementById(id);
              }
              this.pcode=pcode
              this.affiliate_id=affiliate_id
            }
            createApp() {
              this.setupTemplate();
              let me = this;
              let base=null;
              var x = window.matchMedia("(max-width: 480px)")
              if(!x.matches){
                base = me.template.new_base
              }else if(x.matches && me.dynamicdata.is_sticky_button){
                base = me.template.base
              }else if(x.matches && !me.dynamicdata.is_sticky_button ){
                base = me.template.new_base
              }else{
                base = me.template.base
              }
              // console.log(base)
              this.app = createApp({
                template: base,
                //data
                data: () => {
                  return {
                    dynamicdata: me.dynamicdata,
                    funnel_data: me.funnel,
                    flinks:me.flinks,
                    type: me.type,
                    blast_id: me.blast_id,
                    redirect_url: me.redirect_url,
                    textblock: me.textblock,
                    emaildata: {},
                    input_email_data: null,
                    input_name_data: null,
                    input_phone_data: null,
                    is_submited:false,
                    svgArray: me.svgArray,
                    autoData: me.autoData,
                    is_preview: me.is_preview,
                    externalQuotesValue: 'double',
                    quotes: {
                      level1: me.externalQuotesValue === `double` ? quotes_double : quotes_single,
                      level2: me.externalQuotesValue === `double` ? quotes_single : quotes_double
                    },
                    pcode: me.pcode,
                    affiliate_id: me.affiliate_id
                  };
                },
                methods: {
                  getSvgUrl(svg, color, thinkness, pageBackgroundSize) {
                    if (!color) {
                      var color = '#FFFFFF0A';
                    }
                    if (!thinkness) {
                      var thinkness = 1;
                    }
                    if (!pageBackgroundSize) {
                      var pageBackgroundSize = 1;
                    }
                    let newsvg = svg.svg_data.replaceAll('$$$$$$$', color)
                    if (svg.is_transform) {
                      let size = pageBackgroundSize + 100;
                      newsvg = newsvg.replaceAll('#######', size)
                    }
                    let add_thik = thinkness + 0.1;
                    let thik_perce = add_thik;
                    let svg_with_thikness = newsvg.replaceAll('******', thik_perce)
                    const namespaced = this.addNameSpace(svg_with_thikness);
                    const escaped = this.encodeSVG(namespaced);
                    const resultCss = 'data:image/svg+xml,' + escaped;
                    return resultCss
                  },
                  addNameSpace(data) {
                    if (data.indexOf(`http://www.w3.org/2000/svg`) < 0) {
                      data = data.replace(/<svg/g, `<svg xmlns=${this.quotes.level2}http://www.w3.org/2000/svg${this.quotes.level2}`);
                    }
                    return data;
                  },
                  encodeSVG(data) {
                    if (this.externalQuotesValue === `double`) {
                      data = data.replace(/"/g, `'`);
                    } else {
                      data = data.replace(/'/g, `"`);
                    }
                    data = data.replace(/>\s{1,}</g, `><`);
                    data = data.replace(/\s{2,}/g, ` `);
                    const symbols = /[\r\n%#()<>?[\\\]^`{|}]/g;
                    return data.replace(symbols, encodeURIComponent);
                  },
                  updateBgGradient(bg_type) {
                    if (bg_type == 'full') {
                      let angle = ''
                      if (this.dynamicdata.page_gradient.gradient_angle) {
                        angle = this.dynamicdata.page_gradient.gradient_angle + 'deg'
                      }
                      let gradient_stop_1 = ''
                      if (this.dynamicdata.page_gradient.gradient_color_stop_1) {
                        gradient_stop_1 = this.dynamicdata.page_gradient.gradient_color_stop_1 + '%'
                      }
                      let gradient_stop_2 = ''
                      if (this.dynamicdata.page_gradient.gradient_color_stop_2) {
                        gradient_stop_2 = this.dynamicdata.page_gradient.gradient_color_stop_2 + '%'
                      }
                      let background = ''
                      let gradient = ''
                      if (angle) {
                        gradient = `linear-gradient(${angle},${this.dynamicdata.page_gradient.gradient_color_1} ${gradient_stop_1}, ${this.dynamicdata.page_gradient.gradient_color_2} ${gradient_stop_2});`
                      } else {
                        gradient = `linear-gradient(${this.dynamicdata.page_gradient.gradient_color_1} ${gradient_stop_1}, ${this.dynamicdata.page_gradient.gradient_color_2} ${gradient_stop_2});`
                      }
                      if (this.dynamicdata.page_pattern && this.dynamicdata.page_pattern.pattern_type && this.dynamicdata.page_pattern.pattern_type != 'none') {
                        let size=6;
                        if(this.dynamicdata.page_pattern.page_background_size && this.dynamicdata.page_pattern.page_background_size > 1){
                          size= (this.dynamicdata.page_pattern.page_background_size * 5.12).toFixed(0);
                        }
                        document.body.style = this.addCssBody('background_css','gradient',this.dynamicdata.page_pattern.pattern_type,this.dynamicdata.page_pattern.pattern_color,this.dynamicdata.page_pattern.page_background_thickness,this.dynamicdata.page_pattern.page_background_size,size,gradient)
                      } else {
                        document.body.style = `background: ${gradient}`;
                      }
                    } 
                  },
                  getImageBackgroundCss(bg_type) {
                     var raw_background=''
                      if (bg_type == 'full_page') {
                        if (this.dynamicdata.full_background_image && this.dynamicdata.page_pattern && this.dynamicdata.page_pattern.pattern_type && this.dynamicdata.page_pattern.pattern_type != 'none') {
                          var image= 'url(/storage/' + this.dynamicdata.full_background_image + ')'
                          // var color_overlay = '#FFFFFF00'
                          // if (this.dynamicdata.full_color_overlay) {
                          //   color_overlay=this.dynamicdata.full_color_overlay
                          // }
                          var size=6;
                            if(this.dynamicdata.page_pattern.page_background_size && this.dynamicdata.page_pattern.page_background_size > 1){
                              size= (this.dynamicdata.page_pattern.page_background_size * 5.12).toFixed(0);
                            }
                            let svg_data= this.svgArray.find(obj => {
                                return obj.value === this.dynamicdata.page_pattern.pattern_type
                              })
                              var svg_data_url=''
                              if(svg_data && svg_data.svg_data){
                                svg_data_url=this.getSvgUrl(svg_data,this.dynamicdata.page_pattern.pattern_color,this.dynamicdata.page_pattern.page_background_thickness,this.dynamicdata.page_pattern.page_background_size)
                              }
                              var bg_pattern=`url("${svg_data_url}")`;  
                              var background_size=''
                              var background_position=''
                              var bg_repeat=''
                              if(svg_data.is_size_change == false ||  svg_data.is_transform == true){
                                background_size= svg_data.is_custom_bg ? svg_data.background_size: 'cover';
                                background_position=svg_data.background_position;
                                bg_repeat='no-repeat';
                              }else{
                                background_size=size+'px';
                                background_position='center center';
                                bg_repeat='repeat';
                              }
                              raw_background=`background-image:${bg_pattern},${image};${this.getImageSettingCss(3,background_size,background_position,bg_repeat)}`;
                              let overlayColor=''
                              if(this.dynamicdata.full_color_overlay){
                                overlayColor=`background-blend-mode: normal,multiply;
                                  background-color: ${this.dynamicdata.full_color_overlay};`
                              }
                          return `${raw_background} ${overlayColor}`
                        }else if(this.dynamicdata.full_background_image){
                            var image= 'url(/storage/' + this.dynamicdata.full_background_image + ')'
                            // var color_overlay = '#FFFFFF00'
                            // if (this.dynamicdata.full_color_overlay) {
                            //   color_overlay=this.dynamicdata.full_color_overlay
                            // }
                            raw_background=`background-image:${image};
                                ${this.getImageSettingCss(2)}`;
                          let overlayColor=''
                              if(this.dynamicdata.full_color_overlay){
                                overlayColor=`background-blend-mode:multiply;
                                  background-color: ${this.dynamicdata.full_color_overlay};`
                              }
                          return `${raw_background} ${overlayColor}`
                        }
                      
                      } 
                  },
                  getImageSettingCss(used_for,size = null,position=null,bg_repeat=null){
                    let image_setting=this.dynamicdata.full_background_image_position ? this.dynamicdata.full_background_image_position : 'bgCover'
                      let image_bg_size= image_setting == 'bgCover' ? 'cover' : image_setting == 'bgCover101' ? '100% 100%' : '100% auto';
                      let image_bg_repeat= image_setting == 'bgCover' ? 'repeat repeat' : image_setting == 'bgCover101' ? 'no-repeat' : 'no-repeat';
                      let image_bg_position= image_setting == 'bgCover' ? 'center center' : '0% 0%';
                        if(used_for == 2){
                          return  `
                                background-size: ${image_bg_size};
                                -webkit-background-size${image_bg_size};
                                background-repeat: ${image_bg_repeat};
                                background-position:${image_bg_position};
                                ${image_setting == 'bgCover' ? 'background-attachment:fixed;' : ''}
                                `
                        }else{
                          return  `
                                background-size:${size}${image_bg_size};
                                -webkit-background-size:${size},${image_bg_size};
                                background-repeat: ${bg_repeat},${image_bg_repeat};
                                background-position:${position},${image_bg_position};
                                ${image_setting == 'bgCover' ? 'background-attachment: fixed,fixed;' : ''}
                                `
                        }
                  },
                  addCssBody(type, used_for, pattern_type, pattern_color, background_thickness, background_size, size, color_gradient) {
                    var svg_data_url = ''
                    let svg_data= this.svgArray.find(obj => {
                          return obj.value === pattern_type
                    })
                    if (svg_data && svg_data.svg_data) {
                      svg_data_url = this.getSvgUrl(svg_data, pattern_color, background_thickness, background_size)
                    }
                    let bg_pattern = `url("${svg_data_url}")`;
                    let background_relative_css = ''
                    if (used_for == 'gradient') {
                      if (svg_data) {
                        if (svg_data.is_size_change == false || svg_data.is_transform == true) {
                          background_relative_css = `background-size: ${svg_data.is_custom_bg ? svg_data.background_size: 'cover'}, auto;background-position: ${svg_data.background_position}, 0% 0%;background-repeat: no-repeat, repeat;background-attachment: fixed`
                        } else {
                          background_relative_css = `background-size: ${size}px, auto;background-position: center center, 0% 0%;background-repeat: repeat, repeat;background-attachment: fixed;`
                        }
                      }
                      let textContent = `background-image:${bg_pattern},${color_gradient};${background_relative_css}`;
                      return textContent
                    } else {
                      if (svg_data) {
                        if (svg_data.is_size_change == false || svg_data.is_transform == true) {
                          background_relative_css = `background-size: ${svg_data.is_custom_bg ? svg_data.background_size: 'cover'};background-position: ${svg_data.background_position};background-repeat: no-repeat;background-color:${color_gradient} !important;background-attachment: fixed`
                        } else {
                          background_relative_css = `background-size: ${size}px;background-position: center center;background-repeat: repeat;background-color:${color_gradient} !important;background-attachment: fixed;`
                        }
                      }
                      let textContent = `background-image:${bg_pattern};${background_relative_css}`;
                      return textContent
                    }
                  },
                  loadPopupData(x){
                    let payload = {
                      funnel_id : this.funnel_data.id,
                      type : 'lead_steps',
                      screen : x.matches ? 'mobile' : 'desktop'
                    }
                    let url = api_url + '/api/popup-template/get-popup-template-script-data'
                    axios.post(url, payload).then((res) => {
                      if (res.data.status == true) {
                        var popupData = res.data.data.popup_data
                        popupCssData = res.data.data.popup_css
                        popupSetting = res.data.data.popup_setting
                        let section_div =document.createElement('section')
                        section_div.innerHTML=popupData
                        document.body.appendChild(section_div)
                        let nameInput = document.getElementById('name-input')
                        let emailInput = document.getElementById('email-input')
                        let phoneInput = document.getElementById('phone-input')
                        if(this.autoData && this.autoData.email && emailInput){
                          emailInput.value=this.autoData.email
                        }
                        if(this.autoData && this.autoData.name && nameInput){
                          nameInput.value=this.autoData.name
                        }
                        if(this.autoData && this.autoData.phone && phoneInput){
                          phoneInput.value=this.autoData.phone
                        }
                      }
                    })
                  },
                  updateDefaultVideo(){
                        var videoSetting=this.dynamicdata
                        let video_url=''
                        let video_type=''
                        if(videoSetting.general_video_type == 'youtube' || videoSetting.is_video_enabled == 0){
                          return
                        }
                        if(videoSetting && videoSetting.id){
                          if(videoSetting.general_video_type == '' || videoSetting.general_video_type == null){
                            video_type='vimeo'
                            video_url='https://vimeo.com/754576238'
                          }else if(videoSetting.general_video_url == 'https://vimeo.com/754576238'){
                            video_type='vimeo'
                            video_url='https://vimeo.com/754576216'
                          }else if(videoSetting.general_video_url == 'https://vimeo.com/754576216'){
                            video_type='vimeo'
                            video_url='https://vimeo.com/754576205'
                          }else if(videoSetting.general_video_url == 'https://vimeo.com/754576205'){
                            video_type='vimeo'
                            video_url='https://vimeo.com/754576238'
                          }
                        }
                        if(video_url && video_type){
                          let payload={
                            id:videoSetting.id,
                            video_type:video_type,
                            video_url:video_url
                          }
                          if (this.type == 'confpage') {
                              axios.post(api_url +"/api/conf-temaplate/update-default-video", payload);
                          }else{
                            axios.post(api_url +"/api/landing-temaplate/update-default-video", payload);
                          }
                        }
                  },
                  updateFunnelView(){
                    console.log(this.is_preview,'setFunnelView')
                    if(this.is_preview){
                        return
                    }
                    let payload={
                      funnel_id: this.dynamicdata.page_funnel_id,
                      split_id:this.flinks.split_id,
                      pcode: this.pcode
                    }
                    axios.post(api_url +"/api/set-funnel-view", payload)
                  },
                  updateBlastClick(){
                    let payload={
                      traffic_blast_id: this.blast_id,
                      funnel_id: this.dynamicdata.page_funnel_id,
                      pcode: this.pcode
                    }
                    axios.post(api_url +"/api/set-traffic-click", payload)
                  },
                  loadFooterData(x){
                    let payload = {
                      funnel_id : this.funnel_data.id,
                      type : this.type,
                      screen : x.matches ? 'mobile' : 'desktop'
                    }
                    let url = api_url + '/api/template/footer/get-template-script-data'
                    axios.post(url, payload).then((res) => {
                      if (res.data.status == true) {
                        var footerHTML = res.data.data.footer_html
                        let section_div =document.createElement('section')
                        section_div.innerHTML=footerHTML
                        document.body.appendChild(section_div)
                        // document.body.innerHTML += footerHTML
                        var element = document.getElementById('app');
                        var insideTemplateElement = document.getElementById('inside-template-class');
                        var footerHeight = document.getElementById("footer")
                        var height = element.clientHeight;
                        // console.log('footerheight',footerHeight.clientHeight)
                        // console.log('appheight',height)
                        // console.log('insideTemplateElement',insideTemplateElement.clientHeight)
                        // console.log('total height',height + footerHeight.clientHeight)
                        // console.log('screen heigfht',screen.height)
                        // console.log('x',x)
                        if (((height + footerHeight.clientHeight) - 5) < screen.height) {
                            document.getElementById("footer").classList.add('tw-fixed');
                        }
                      }
                    })
                  },
                  getBannerData(funnel,x){
                    let payload = {
                      ...funnel.banner_setting,
                      isMobile:x.matches
                    }
                    let url = api_url + '/api/banner/generate-banner'
                    axios.post(url, payload).then((res) => {
                      if (res.data.status == true) {
                        var bannerHtml = res.data.data.htmldata
                        let bannerDiv=document.getElementById('banner-setting-append');
                        if(bannerDiv && bannerHtml){
                          const scriptEl = document.createRange().createContextualFragment(bannerHtml);
                          bannerDiv.append(scriptEl);
                        }
                      }
                    })
                  }
                },
                mounted() {
                  if(this.autoData && this.autoData.email){
                      this.input_email_data=this.autoData.email
                  }
                  if(this.autoData && this.autoData.name){
                      this.input_name_data=this.autoData.name
                  }
                  if(this.autoData && this.autoData.phone){
                      this.input_phone_data=this.autoData.phone
                  }
                  if (this.type == 'leadpage' || this.type == 'bridgepage' ) {
                    this.updateFunnelView();
                  }
                  if(this.type == 'leadpage' && this.blast_id){
                      this.updateBlastClick()
                  }
                  var x = window.matchMedia("(max-width: 480px)")
                  //for bold and regular text
                  var styleSheet = document.createElement('style');
                  styleSheet.type = 'text/css';
                  let css_data = ''
                  if (this.dynamicdata.headline_text_color) {
                    css_data += '.t-1-heading span { color: ' + this.dynamicdata.headline_text_color + ' !important; }';
                  }
                  if (this.dynamicdata.bullet_title_text_color) {
                    css_data += '.t-1-bullet-title span { color: ' + this.dynamicdata.bullet_title_text_color + ' !important; }';
                  }

                  if (this.dynamicdata.sub_headline_bold_color) {
                    css_data += '.t-1-subheading b { color: ' + this.dynamicdata.sub_headline_bold_color + ' !important; }';
                  }
                  if (this.dynamicdata.cta_bold_color) {
                    css_data += '.t-1-cta-statement b { color: ' + this.dynamicdata.cta_bold_color + ' !important; }';
                  }
                  if (this.dynamicdata.privacy_bold_color) {
                    css_data += '.t-1-disclaimer b { color: ' + this.dynamicdata.privacy_bold_color + ' !important; }';
                  }
                  if (this.dynamicdata.bullet_bold_color) {
                    css_data += '.t-1-bullet b { color: ' + this.dynamicdata.bullet_bold_color + ' !important; }';
                  }
                  if (this.dynamicdata.input_is_border_enabled) {
                    css_data += `.custom-form { border : ${this.dynamicdata && this.dynamicdata.input_border_size ? this.dynamicdata.input_border_size : ""}px ${this.dynamicdata && this.dynamicdata.input_border_style ? this.dynamicdata.input_border_style : ""} ${this.dynamicdata && this.dynamicdata.input_border_color ? this.dynamicdata.input_border_color : ""} !important; padding-top : 18px !important; }`
                  }
                  if (this.dynamicdata.template_size != 1 && !x.matches) {
                    css_data += `.base-margin-class { margin-top : ${this.dynamicdata && this.dynamicdata.page_spacing_before ? this.dynamicdata.page_spacing_before : ""}px !important; margin-bottom : ${this.dynamicdata && this.dynamicdata.page_spacing_after ? this.dynamicdata.page_spacing_after : ""}px !important;border-radius : ${this.dynamicdata && this.dynamicdata.box_radius ? this.dynamicdata.box_radius : "0"}px !important`;
                  }
                  styleSheet.textContent = css_data
                  document.head.appendChild(styleSheet);
                  //for page orientation
                  //  x.matches
                  if (x.matches) {

                    let mobile_template = document.getElementById('root-template-class');
                    if (mobile_template) {
                      mobile_template.style.minHeight = '100%'
                    }
                    let second_box= document.getElementById('second-box');
                    if(second_box){
                      second_box.style.paddingTop = '22px'
                    }
                  }
                  //page backgrond
                    if (this.dynamicdata.full_background_type == 'image' && this.dynamicdata.full_background_image) {
                      document.body.style=this.getImageBackgroundCss('full_page')
                    } else if (this.dynamicdata.full_background_type == 'gradient' && this.dynamicdata.page_gradient && this.dynamicdata.page_gradient.gradient_color_1 && this.dynamicdata.page_gradient.gradient_color_2) {
                      this.updateBgGradient('full')
                    } else {
                      var body_background_color=''
                      if(this.dynamicdata.template_size == 1){
                        body_background_color = this.dynamicdata.page_background_color
                      }else{
                        body_background_color = this.dynamicdata.outside_background_color
                      }
                      if (this.dynamicdata.page_pattern && this.dynamicdata.page_pattern.pattern_type && this.dynamicdata.page_pattern.pattern_type != 'none') {
                        let size=6;
                        if(this.dynamicdata.page_pattern.page_background_size && this.dynamicdata.page_pattern.page_background_size > 1){
                          size= (this.dynamicdata.page_pattern.page_background_size * 5.12).toFixed(0);
                        }
                        document.body.style =this.addCssBody('background_css','color',this.dynamicdata.page_pattern.pattern_type,this.dynamicdata.page_pattern.pattern_color,this.dynamicdata.page_pattern.page_background_thickness,this.dynamicdata.page_pattern.page_background_size,size,body_background_color)
                      } else {

                        getVimeoId(input) {
                          if(input){  
                            var pattern = /(?:http?s?:\/\/)?(?:www\.)?(?:vimeo\.com)\/?(\S+)/g;
                            var iframepattern = /(?:http?s?:\/\/)?(?:www\.)?(?:player\.vimeo\.com)\/?(\S+)/g;
                          if(iframepattern.test(input)){
                              var input = input.replace('https:','');
                              return input
                            }else if (pattern.test(input)) {
                              var replacement = "//player.vimeo.com/video/$1";
                              var input = input.replace(pattern, replacement);
                              return input;
                            }
                            return '//player.vimeo.com/video/754576238'

            loadGoogleFonts() {
              var d = this.dynamicdata;
              if (!d) return;
              var fontFields = [
                'headline_font_family', 'sub_headline_font_family',
                'cta_font_family', 'privacy_font_family', 'button_font_family'
              ];
              var systemFonts = ['Arial','Helvetica','Georgia','Verdana','Trebuchet MS','Times New Roman','Courier New','Impact'];
              var families = [];
              fontFields.forEach(function(field) {
                var f = d[field];
                if (f && systemFonts.indexOf(f) === -1 && families.indexOf(f) === -1) {
                  families.push(f);
                }
              });
              if (families.length === 0) return;
              var link = document.createElement('link');
              link.rel = 'stylesheet';
              link.href = 'https://fonts.googleapis.com/css2?family=' +
                families.map(function(f) {
                  return f.replace(/ /g, '+') + ':wght@400;600;700';
                }).join('&family=') + '&display=swap';
              document.head.appendChild(link);
            }
          }
